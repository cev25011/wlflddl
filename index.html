<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🐍 Worm Game</title>
<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}
canvas{
    background:black;
    border:4px solid white;
    margin-top:20px;
}
button{
    margin-top:15px;
    padding:8px 20px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>🐍 Worm Game 🐍</h1>
<div id="score">Score: 0</div>
<canvas id="gameCanvas" width="600" height="600"></canvas>
<br>
<button onclick="restartGame()">다시 시작</button>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const gridSize = 20;
const tileCount = canvas.width / gridSize;

let snake;
let food;
let goldenFood = null;
let dx, dy;
let score;
let speed;
let gameOver;
let loop;

function init(){
    snake = [{x:10,y:10}];
    dx = 1;
    dy = 0;
    score = 0;
    speed = 120;
    gameOver = false;
    spawnFood();
    goldenFood = null;
}

function spawnFood(){
    food = {
        x: Math.floor(Math.random()*tileCount),
        y: Math.floor(Math.random()*tileCount)
    };

    if(Math.random()<0.2){
        goldenFood = {
            x: Math.floor(Math.random()*tileCount),
            y: Math.floor(Math.random()*tileCount)
        };
    }
}

function drawRect(x,y,color){
    ctx.fillStyle=color;
    ctx.fillRect(x*gridSize,y*gridSize,gridSize-2,gridSize-2);
}

function moveSnake(){
    const head = {x:snake[0].x+dx, y:snake[0].y+dy};

    if(head.x<0||head.x>=tileCount||head.y<0||head.y>=tileCount){
        gameOver=true;
        return;
    }

    for(let part of snake){
        if(head.x===part.x && head.y===part.y){
            gameOver=true;
            return;
        }
    }

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){
        score++;
        spawnFood();
        speedUp();
    }
    else if(goldenFood && head.x===goldenFood.x && head.y===goldenFood.y){
        score+=2;
        goldenFood=null;
        speedUp();
    }
    else{
        snake.pop();
    }
}

function speedUp(){
    if(speed>60){
        speed-=5;
        clearInterval(loop);
        loop=setInterval(update,speed);
    }
}

function draw(){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    snake.forEach(s=>drawRect(s.x,s.y,"lime"));
    drawRect(food.x,food.y,"red");

    if(goldenFood){
        drawRect(goldenFood.x,goldenFood.y,"gold");
    }

    document.getElementById("score").innerText="Score: "+score;

    if(gameOver){
        ctx.fillStyle="white";
        ctx.font="40px Arial";
        ctx.fillText("GAME OVER",170,300);
    }
}

function update(){
    if(gameOver) return;
    moveSnake();
    draw();
}

document.addEventListener("keydown",e=>{
    switch(e.key){
        case "ArrowUp": if(dy!==1){dx=0;dy=-1;} break;
        case "ArrowDown": if(dy!==-1){dx=0;dy=1;} break;
        case "ArrowLeft": if(dx!==1){dx=-1;dy=0;} break;
        case "ArrowRight": if(dx!==-1){dx=1;dy=0;} break;
    }
});

function restartGame(){
    clearInterval(loop);
    init();
    loop=setInterval(update,speed);
}

init();
loop=setInterval(update,speed);
</script>

</body>
</html>
