<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🐍 Worm Arena</title>
<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}
canvas{
    background:black;
    border:4px solid white;
    margin-top:20px;
}
.scoreboard{
    display:flex;
    justify-content:space-around;
    font-size:20px;
    margin-top:10px;
}
button{
    margin-top:15px;
    padding:8px 20px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>🐍 Worm Arena 🐍</h1>

<div class="scoreboard">
<div id="score1">Player1: 0</div>
<div id="score2">Player2: 0</div>
</div>

<canvas id="gameCanvas" width="600" height="600"></canvas>
<br>
<button onclick="restartGame()">다시 시작</button>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const gridSize = 20;
const tileCount = canvas.width / gridSize;

let snake1, snake2;
let food;
let goldenFood = null;
let dx1, dy1, dx2, dy2;
let score1, score2;
let speed;
let gameOver;
let loop;

function init(){
    snake1 = [{x:5,y:5}];
    snake2 = [{x:25,y:25}];
    dx1=1; dy1=0;
    dx2=-1; dy2=0;
    score1=0; score2=0;
    speed=120;
    gameOver=false;
    spawnFood();
    goldenFood=null;
}

function spawnFood(){
    food={
        x:Math.floor(Math.random()*tileCount),
        y:Math.floor(Math.random()*tileCount)
    };
    if(Math.random()<0.2){
        goldenFood={
            x:Math.floor(Math.random()*tileCount),
            y:Math.floor(Math.random()*tileCount)
        };
    }
}

function drawRect(x,y,color){
    ctx.fillStyle=color;
    ctx.fillRect(x*gridSize,y*gridSize,gridSize-2,gridSize-2);
}

function moveSnake(snake,dx,dy,isPlayer1){
    const head={x:snake[0].x+dx,y:snake[0].y+dy};

    if(head.x<0||head.x>=tileCount||head.y<0||head.y>=tileCount){
        gameOver=true;
        return;
    }

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){
        if(isPlayer1) score1++;
        else score2++;
        spawnFood();
        speedUp();
    }
    else if(goldenFood && head.x===goldenFood.x && head.y===goldenFood.y){
        if(isPlayer1) score1+=2;
        else score2+=2;
        goldenFood=null;
        speedUp();
    }
    else{
        snake.pop();
    }
}

function speedUp(){
    if(speed>60){
        speed-=5;
        clearInterval(loop);
        loop=setInterval(update,speed);
    }
}

function checkCollision(){
    const head1=snake1[0];
    const head2=snake2[0];

    if(head1.x===head2.x && head1.y===head2.y){
        gameOver=true;
    }

    snake1.slice(1).forEach(s=>{
        if(head2.x===s.x && head2.y===s.y) gameOver=true;
    });

    snake2.slice(1).forEach(s=>{
        if(head1.x===s.x && head1.y===s.y) gameOver=true;
    });
}

function draw(){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    snake1.forEach(s=>drawRect(s.x,s.y,"lime"));
    snake2.forEach(s=>drawRect(s.x,s.y,"cyan"));
    drawRect(food.x,food.y,"red");

    if(goldenFood){
        drawRect(goldenFood.x,goldenFood.y,"gold");
    }

    document.getElementById("score1").innerText="Player1: "+score1;
    document.getElementById("score2").innerText="Player2: "+score2;

    if(gameOver){
        ctx.fillStyle="white";
        ctx.font="40px Arial";
        ctx.fillText("GAME OVER",180,300);
    }
}

function update(){
    if(gameOver) return;

    moveSnake(snake1,dx1,dy1,true);
    moveSnake(snake2,dx2,dy2,false);
    checkCollision();
    draw();
}

document.addEventListener("keydown",e=>{
    switch(e.key){
        case "w": if(dy1!==1){dx1=0;dy1=-1;} break;
        case "s": if(dy1!==-1){dx1=0;dy1=1;} break;
        case "a": if(dx1!==1){dx1=-1;dy1=0;} break;
        case "d": if(dx1!==-1){dx1=1;dy1=0;} break;

        case "ArrowUp": if(dy2!==1){dx2=0;dy2=-1;} break;
        case "ArrowDown": if(dy2!==-1){dx2=0;dy2=1;} break;
        case "ArrowLeft": if(dx2!==1){dx2=-1;dy2=0;} break;
        case "ArrowRight": if(dx2!==-1){dx2=1;dy2=0;} break;
    }
});

function restartGame(){
    clearInterval(loop);
    init();
    loop=setInterval(update,speed);
}

init();
loop=setInterval(update,speed);
</script>

</body>
</html>
